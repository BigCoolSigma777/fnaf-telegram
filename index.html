<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Terminal</title>
    <style>
        /* СТИЛИ БЕЗ ЛИШНЕГО ХЛАМА */
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #warning-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; }
        #main-menu { display: none; width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { border: 2px solid #333; padding: 10px; text-decoration: none; color: #fff; background: #050505; display: block; }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; background: #222; }
        
        h2 { color: #a00; font-size: 24px; margin: 0 0 10px 0; }
        p { color: #777; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <!-- 1. ВАРНИНГ -->
    <div id="warning-screen">
        <h2>WARNING</h2>
        <p>This terminal contains loud noises and disturbing imagery.</p>
        <p style="color: #222; margin-top: 20px;">LOADING...</p>
    </div>

    <!-- 2. МЕНЮ -->
    <div id="main-menu">
        <h1 style="font-size: 18px; color: #555;">SELECT NIGHTMARE</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="card">
                <img src="assets/fnaf1.jpg" alt="">
                <div style="margin-top:5px;">FNaF 1</div>
            </a>
            <a href="games/fnaf2/index.html" class="card">
                <img src="assets/fnaf2.png" alt="">
                <div style="margin-top:5px;">FNaF 2</div>
            </a>
        </div>
    </div>

    <script>
        // ПРОСТЕЙШИЙ ТАЙМЕР БЕЗ ЗАВИСИМОСТЕЙ
        window.onload = function() {
            console.log("Загрузка пошла...");
            
            setTimeout(function() {
                var warning = document.getElementById('warning-screen');
                var menu = document.getElementById('main-menu');
                
                if (warning && menu) {
                    warning.style.display = 'none'; // Убираем варнинг
                    menu.style.display = 'block';   // Показываем меню
                    console.log("Меню открыто!");
                } else {
                    alert("Ошибка: элементы не найдены!");
                }
            }, 3000); // 3 секунды ровно
        };
    </script>

</body>
</html>
