<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FNaF Anthology Terminal</title>
    <style>
        :root { --brightness: 0.7; --static-opacity: 0.1; }

        /* ЕЛЕ ЗАМЕТНОЕ ФОНОВОЕ ДРОЖАНИЕ */
        @keyframes ambient-vibration {
            0% { transform: translate(0, 0); }
            50% { transform: translate(0.2px, 0.2px); }
            100% { transform: translate(0, 0); }
        }

        /* ЗАМЕТНЫЙ СКАЧОК СИГНАЛА */
        @keyframes signal-jump {
            0% { transform: translate(0); }
            10% { transform: translate(-3px, 1px); filter: brightness(1.3); }
            20% { transform: translate(3px, -1px); }
            30% { transform: translate(0); }
        }

        body {
            background-color: #050505; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 40px 0;
            overflow-x: hidden; overflow-y: auto; text-align: center;
            /* Постоянная микро-вибрация */
            animation: ambient-vibration 0.3s infinite;
        }

        .jump-active { animation: signal-jump 0.2s linear !important; }

        /* ЭФФЕКТЫ МОНИТОРА */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: scanAnim 7s linear infinite; pointer-events: none; z-index: 1000;
        }
        @keyframes scanAnim { 0% { top: -120px; } 100% { top: 100vh; } }

        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 900; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .crt-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 901;
        }

        h1 { font-size: 2.2rem; letter-spacing: 6px; margin-bottom: 30px; z-index: 10; position: relative; text-shadow: 1px 0 red, -1px 0 blue; }
        .its-me-style { color: #ff0000 !important; text-shadow: 0 0 10px red !important; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; z-index: 10; max-width: 500px; filter: brightness(var(--brightness)); }
        .game-card { text-decoration: none; color: #bbb; border: 2px solid #222; padding: 12px; transition: 0.3s; background: rgba(0,0,0,0.9); width: 190px; }
        .game-card:hover { border-color: #700; transform: scale(1.02); }
        .game-card img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid #222; }
        
        .settings-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 48px; height: 48px;
            cursor: pointer; z-index: 2000;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 16 16" shape-rendering="crispEdges"><path fill="black" d="M6 0h4v1h2v2h1v2h3v6h-3v2h-1v2h-2v1H6v-1H4v-2H3v-2H0V5h3V3h1V1h2V0z"/><path fill="%23777" d="M7 2h2v1h2v2h2v6h-2v2h-2v1H7v-1H5v-2H3V5h2V3h2V2z"/><path fill="black" d="M7 7h2v2H7z"/></svg>');
            background-size: contain; background-repeat: no-repeat;
            image-rendering: pixelated; transition: transform 0.5s steps(8);
        }

        #settings-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid #a00; padding: 25px; z-index: 3000; width: 280px; text-align: left; }
        .static-noise { position: fixed; inset: 0; background: url('https://giphy.com'); opacity: var(--static-opacity); pointer-events: none; z-index: 800; }
        .dev-placeholder { width: 100%; height: 250px; background: #080808; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; color: #222; font-size: 11px; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="monitor-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>
    <div class="static-noise"></div>
    <div class="scanline"></div>
    <div class="crt-overlay"></div>

    <div class="settings-btn" onclick="toggleSettings()"></div>

    <h1 id="main-title">Select a Nightmare</h1>

    <div class="grid">
        <a href="games/fnaf1/index.html" class="game-card" onmouseover="maybeScreamer(this)" onmouseout="resetScreamer(this)">
            <img src="assets/fnaf1.jpg" alt="FNaF 1"><span>FNaF 1</span>
        </a>
        <a href="games/fnaf2/index.html" class="game-card">
            <img src="assets/fnaf2.png" alt="FNaF 2"><span>FNaF 2</span>
        </a>
        <div class="game-card"><div class="dev-placeholder">В РАЗРАБОТКЕ</div><span>FNaF 3</span></div>
        <div class="game-card"><div class="dev-placeholder">В РАЗРАБОТКЕ</div><span>FNaF 4</span></div>
    </div>

    <div id="settings-panel">
        <h2 style="color:red; font-size:12px; margin-top:0;">TERMINAL CONFIG</h2>
        <div class="setting-row"><label>BRIGHTNESS</label><input type="range" id="bright-ctrl" min="20" max="100" value="70"></div>
        <div class="setting-row"><label>STATIC NOISE</label><input type="range" id="noise-ctrl" min="0" max="20" value="10"></div>
        <div class="setting-row"><label>VOLUME</label><input type="range" id="vol-ctrl" min="0" max="50" value="20"></div>
        <button onclick="toggleSettings()" style="background:#a00; color:white; border:none; padding:10px; width:100%; cursor:pointer;">EXIT</button>
    </div>

    <script>
        const hum = document.getElementById('monitor-hum');
        const root = document.querySelector(':root');
        let audioInited = false;
        function initAudio() { if (!audioInited) { hum.volume = 0.2; hum.play(); audioInited = true; } }
        function toggleSettings() { const panel = document.getElementById('settings-panel'); panel.style.display = (panel.style.display === 'block') ? 'none' : 'block'; }
        
        document.getElementById('bright-ctrl').addEventListener('input', (e) => root.style.setProperty('--brightness', e.target.value / 100));
        document.getElementById('noise-ctrl').addEventListener('input', (e) => root.style.setProperty('--static-opacity', e.target.value / 100));
        document.getElementById('vol-ctrl').addEventListener('input', (e) => hum.volume = e.target.value / 100);

        const title = document.getElementById('main-title');
        
        // ЦИКЛ ПАСХАЛОК И ПЛАНОВЫХ СКАЧКОВ (раз в 10 секунд)
        function triggerMainEffect() {
            const chance = Math.random();
            
            // С шансом 10% показываем IT'S ME
            if(chance > 0.90) {
                title.innerText = "IT'S ME";
                title.classList.add('its-me-style');
                document.body.classList.add('jump-active');
                
                setTimeout(() => {
                    title.innerText = "Select a Nightmare";
                    title.classList.remove('its-me-style');
                    document.body.classList.remove('jump-active');
                }, 150);
            } else {
                // Если пасхалка не выпала, просто делаем заметный скачок экрана
                document.body.classList.add('jump-active');
                setTimeout(() => document.body.classList.remove('jump-active'), 200);
            }
            
            // Следующий эффект через 10 секунд
            setTimeout(triggerMainEffect, 10000);
        }

        // Запуск системы эффектов
        setTimeout(triggerMainEffect, 5000);

        let sT; function maybeScreamer(el) { const img = el.querySelector('img'); const s = img.src; sT = setTimeout(() => { if(Math.random() > 0.8) { img.src = "https://giphy.com"; setTimeout(() => img.src = s, 250); } }, 3500); }
        function resetScreamer() { clearTimeout(sT); }
    </script>
</body>
</html>
