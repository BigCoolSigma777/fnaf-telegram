<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FNaF Anthology Terminal</title>
    
    <script src="https://telegram.org"></script>

    <style>
        :root { --brightness: 0.7; --static-opacity: 0.1; --tg-viewport-height: 100vh; }

        @keyframes ambient-vibration {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(0.3px, 0.3px); }
        }
        @keyframes signal-jump {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-3px, 1px); filter: brightness(1.3); }
            20% { transform: translate(3px, -1px); }
        }
        @keyframes scanAnim { 0% { top: -120px; } 100% { top: 100vh; } }
        @keyframes rare-shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
        }

        body {
            background-color: #050505; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 0;
            overflow-x: hidden; overflow-y: auto; text-align: center;
            animation: ambient-vibration 0.3s infinite;
            -webkit-user-select: none;
        }

        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: scanAnim 7s linear infinite; pointer-events: none; z-index: 1000;
        }

        .crt-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 901;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
        }

        .static-noise { 
            position: fixed; inset: 0; z-index: 800; pointer-events: none;
            background: url('https://giphy.com'); 
            opacity: var(--static-opacity); 
        }

        #main-content { padding: 20px; z-index: 10; width: 100%; box-sizing: border-box; }
        
        h1 { font-size: 1.5rem; letter-spacing: 3px; margin: 20px 0; text-shadow: 1px 0 red, -1px 0 blue; }
        .its-me-style { color: #ff0000 !important; text-shadow: 0 0 10px red !important; }

        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            max-width: 400px; margin: 0 auto; filter: brightness(var(--brightness));
        }

        .game-card { 
            text-decoration: none; color: #bbb; border: 2px solid #222; 
            padding: 8px; background: rgba(0,0,0,0.9); transition: 0.2s;
            display: flex; flex-direction: column;
        }
        .game-card:active { border-color: #a00; transform: scale(0.95); }
        .game-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; border-bottom: 1px solid #222; }
        .game-card span { margin-top: 8px; font-size: 12px; font-weight: bold; }

        .dev-placeholder { width: 100%; aspect-ratio: 4/5; background: #080808; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; }

        #warning-screen {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s;
        }

        #rare-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; align-items: center; justify-content: center; }
        .rare-shake-effect { animation: rare-shake 0.1s infinite; }
        .jump-active { animation: signal-jump 0.2s linear !important; }

        .settings-btn { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; background: #222; z-index: 1000; border-radius: 5px; cursor: pointer; }
        #settings-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #000; border: 3px solid #a00; padding: 20px; z-index: 3000; width: 260px;
        }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="monitor-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>

    <div class="scanline"></div>
    <div class="crt-overlay"></div>
    <div class="static-noise"></div>

    <!-- ЭКРАН ПРЕДУПРЕЖДЕНИЯ -->
    <div id="warning-screen">
        <h2 style="color:#a00; letter-spacing:5px;">WARNING</h2>
        <p style="max-width:250px; font-size:12px; color:#777; line-height:1.5;">
            This terminal contains loud noises and disturbing imagery.
        </p>
        <div style="margin-top:20px; font-size:10px; color:#333;">LOADING TERMINAL...</div>
    </div>

    <!-- РЕДКИЙ ЭКРАН -->
    <div id="rare-screen">
        <img id="rare-img" src="assets/rare_freddy.jpg" style="width:80%; object-fit:contain;">
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-content" style="display:none; opacity:0; transition: opacity 0.8s;">
        <h1 id="main-title">Select a Nightmare</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="game-card" onmouseover="maybeScreamer(this)" onmouseout="resetScreamer()">
                <img src="assets/fnaf1.jpg" alt="FNaF 1"><span>FNaF 1</span>
            </a>
            <!-- FNAF 2 ТЕПЕРЬ ТУТ -->
            <a href="games/fnaf2/index.html" class="game-card" onmouseover="maybeScreamer(this)" onmouseout="resetScreamer()">
                <img src="assets/fnaf2.png" alt="FNaF 2"><span>FNaF 2</span>
            </a>
            <div class="game-card"><div class="dev-placeholder">IN DEV</div><span>FNaF 3</span></div>
            <div class="game-card"><div class="dev-placeholder">IN DEV</div><span>FNaF 4</span></div>
        </div>
        <div class="settings-btn" onclick="toggleSettings()"></div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settings-panel">
        <h3 style="color:red; margin:0 0 15px 0; font-size:14px;">TERMINAL CONFIG</h3>
        <div style="margin:10px 0; font-size:10px; color:#666;">BRIGHTNESS <input type="range" id="bright-ctrl" min="20" max="100" value="70" style="width:100%;"></div>
        <div style="margin:10px 0; font-size:10px; color:#666;">STATIC <input type="range" id="noise-ctrl" min="0" max="20" value="10" style="width:100%;"></div>
        <button onclick="toggleSettings()" style="width:100%; padding:10px; background:#a00; color:#fff; border:none; margin-top:10px; cursor:pointer;">EXIT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const hum = document.getElementById('monitor-hum');
        const root = document.querySelector(':root');
        let audioInited = false;

        function initAudio() {
            if (!audioInited && hum) {
                hum.volume = 0.1;
                hum.play().catch(() => {});
                audioInited = true;
            }
        }

        // Логика перехода: 3 секунды висим + 1 секунда на затухание
        setTimeout(() => {
            const warning = document.getElementById('warning-screen');
            warning.style.opacity = '0';
            setTimeout(() => {
                warning.style.display = 'none';
                if (Math.random() < 0.1) {
                    const rare = document.getElementById('rare-screen');
                    rare.style.display = 'flex';
                    document.getElementById('rare-img').classList.add('rare-shake-effect');
                    setTimeout(() => { rare.style.display='none'; showMenu(); }, 1200);
                } else {
                    showMenu();
                }
            }, 1000);
        }, 3000);

        function showMenu() {
            const content = document.getElementById('main-content');
            content.style.display = 'block';
            setTimeout(() => content.style.opacity = "1", 50);
            triggerMainEffect();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        document.getElementById('bright-ctrl').addEventListener('input', (e) => root.style.setProperty('--brightness', e.target.value / 100));
        document.getElementById('noise-ctrl').addEventListener('input', (e) => root.style.setProperty('--static-opacity', e.target.value / 100));

        function triggerMainEffect() {
            document.body.classList.add('jump-active');
            setTimeout(() => document.body.classList.remove('jump-active'), 150);
            setTimeout(triggerMainEffect, 5000 + Math.random() * 5000);
        }

        let sT;
        function maybeScreamer(el) {
            const img = el.querySelector('img');
            const original = img.src;
            sT = setTimeout(() => {
                if(Math.random() > 0.7) {
                    img.src = "https://giphy.com";
                    setTimeout(() => img.src = original, 300);
                }
            }, 3000);
        }
        function resetScreamer() { clearTimeout(sT); }
    </script>
</body>
</html>
