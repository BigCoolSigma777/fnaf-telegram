<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FNaF Anthology Terminal</title>
    <script src="https://telegram.org"></script>

    <style>
        :root { --brightness: 0.7; --static-opacity: 0.1; }
        @keyframes ambient-vibration { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(0.3px, 0.3px); } }
        @keyframes signal-jump { 0%, 100% { transform: translate(0); } 10% { transform: translate(-3px, 1px); filter: brightness(1.3); } 20% { transform: translate(3px, -1px); } }
        @keyframes rare-shake { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.05) translate(2px, -2px); } 50% { transform: scale(1) translate(-2px, 2px); } }

        body {
            background-color: #000; color: white; font-family: 'Courier New', monospace;
            margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center;
            animation: ambient-vibration 0.2s infinite; -webkit-user-select: none;
        }

        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent); animation: scanAnim 8s linear infinite; pointer-events: none; z-index: 1000; }
        @keyframes scanAnim { 0% { top: -100px; } 100% { top: 100vh; } }
        
        .static-noise { position: fixed; inset: 0; z-index: 800; pointer-events: none; background: url('https://giphy.com'); opacity: var(--static-opacity); }

        /* ЭКРАНЫ */
        #warning-screen, #rare-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        #rare-screen { display: none; z-index: 2100; }
        .rare-img { width: 100%; height: 100%; object-fit: cover; animation: rare-shake 0.1s infinite; filter: contrast(1.2) brightness(0.8); }

        #main-content { padding: 20px; z-index: 10; width: 100%; opacity: 0; display: none; transition: opacity 0.8s; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 400px; margin: 0 auto; filter: brightness(var(--brightness)); }
        .game-card { text-decoration: none; color: #bbb; border: 2px solid #222; padding: 8px; background: #000; display: flex; flex-direction: column; transition: 0.2s; }
        .game-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
        .game-card:active { border-color: #a00; transform: scale(0.95); }
        
        .settings-btn { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; background: #222; z-index: 1000; border-radius: 5px; }
        #settings-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid #a00; padding: 20px; z-index: 3000; width: 260px; }
        .jump-active { animation: signal-jump 0.15s linear !important; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="monitor-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>
    <div class="scanline"></div>
    <div class="static-noise"></div>

    <!-- 1. ЭКРАН ПРЕДУПРЕЖДЕНИЯ -->
    <div id="warning-screen">
        <h2 style="color:#a00; letter-spacing:5px;">WARNING</h2>
        <p style="max-width:250px; font-size:12px; color:#777;">This terminal contains loud noises and disturbing imagery.</p>
    </div>

    <!-- 2. ЭКРАН С ФРЕДДИ (ШАНС 20%) -->
    <div id="rare-screen">
        <img src="assets/rare_freddy.jpg" class="rare-img">
    </div>

    <!-- 3. ГЛАВНОЕ МЕНЮ -->
    <div id="main-content">
        <h1 style="font-size: 1.2rem; letter-spacing: 3px; margin: 20px 0;">SELECT NIGHTMARE</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="game-card">
                <img src="assets/fnaf1.jpg"><span>FNaF 1</span>
            </a>
            <a href="games/fnaf2/index.html" class="game-card">
                <img src="assets/fnaf2.png"><span>FNaF 2</span>
            </a>
            <div class="game-card" style="opacity: 0.3;"><div style="height:150px; background:#111;"></div><span>FNaF 3</span></div>
            <div class="game-card" style="opacity: 0.3;"><div style="height:150px; background:#111;"></div><span>FNaF 4</span></div>
        </div>
        <div class="settings-btn" onclick="toggleSettings()"></div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settings-panel">
        <h3 style="color:red; margin:0 0 15px 0; font-size:14px;">CONFIG</h3>
        <input type="range" id="bright-ctrl" min="20" max="100" value="70" style="width:100%;">
        <button onclick="toggleSettings()" style="width:100%; padding:10px; background:#a00; color:#fff; border:none; margin-top:15px;">EXIT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const hum = document.getElementById('monitor-hum');
        let audioInited = false;
        function initAudio() { if (!audioInited && hum) { hum.volume = 0.1; hum.play(); audioInited = true; } }

        // ЛОГИКА ЗАГРУЗКИ
        setTimeout(() => {
            const warning = document.getElementById('warning-screen');
            warning.style.opacity = '0';
            
            setTimeout(() => {
                warning.style.display = 'none';
                
                // ШАНС 20% НА ТВОЮ КАРТИНКУ
                if (Math.random() < 0.20) {
                    const rare = document.getElementById('rare-screen');
                    rare.style.display = 'flex';
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                    
                    setTimeout(() => {
                        rare.style.opacity = '0';
                        setTimeout(() => {
                            rare.style.display = 'none';
                            showMenu();
                        }, 800);
                    }, 2000); // 2 секунды Фредди пялится в душу
                } else {
                    showMenu();
                }
            }, 800);
        }, 3000); // 3 секунды на варнинг

        function showMenu() {
            const mc = document.getElementById('main-content');
            mc.style.display = 'block';
            setTimeout(() => mc.style.opacity = '1', 50);
            triggerGlitch();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function triggerGlitch() {
            document.body.classList.add('jump-active');
            setTimeout(() => document.body.classList.remove('jump-active'), 100);
            setTimeout(triggerGlitch, 4000 + Math.random() * 6000);
        }

        document.getElementById('bright-ctrl').addEventListener('input', (e) => {
            document.querySelector(':root').style.setProperty('--brightness', e.target.value / 100);
        });
    </script>
</body>
</html>
