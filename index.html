<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --brightness: 0.8; }
        
        /* ГЛАВНАЯ АНИМАЦИЯ ПРЫЖКА (БЕЗ НЕЁ НЕ БУДЕТ ЭФФЕКТОВ) */
        @keyframes signal-jump { 
            0%, 100% { transform: translate(0,0); filter: brightness(1); } 
            10% { transform: translate(-5px, 2px); filter: brightness(1.5); } 
            20% { transform: translate(5px, -2px); filter: brightness(0.8); }
        }
        .jump-active { animation: signal-jump 0.15s linear !important; }

        body { 
            background: #000; color: #eee; font-family: monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        .scanline { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
        
        #main-content { padding: 20px; z-index: 10; width: 100%; text-align: center; }
        h1 { font-size: 1.2rem; letter-spacing: 5px; color: #444; text-transform: uppercase; margin: 30px 0; }
        .its-me { color: #f00 !important; text-shadow: 0 0 10px red; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; filter: brightness(var(--brightness)); }
        .card { text-decoration: none; background: #080808; border: 1px solid #222; padding: 10px; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
        .card span { margin-top: 10px; font-size: 10px; color: #555; }
    </style>
</head>
<body onclick="tg.HapticFeedback.impactOccurred('light')">

    <div class="scanline"></div>

    <div id="main-content">
        <h1 id="title">TERMINAL ACCESS</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="card">
                <img src="assets/fnaf1.jpg"><span>ENTRY_01: FNAF</span>
            </a>
            <a href="games/fnaf2/index.html" class="card">
                <img src="assets/fnaf2.png"><span>ENTRY_02: FNAF_2</span>
            </a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ФУНКЦИЯ ГЛЮКОВ
        function startGlitches() {
            const body = document.body;
            const title = document.getElementById('title');

            setInterval(() => {
                // Шанс на глюк
                if (Math.random() > 0.8) {
                    body.classList.add('jump-active');
                    
                    // Шанс на надпись IT'S ME
                    if (Math.random() > 0.7) {
                        title.innerText = "IT'S ME";
                        title.classList.add('its-me');
                    }

                    setTimeout(() => {
                        body.classList.remove('jump-active');
                        title.innerText = "TERMINAL ACCESS";
                        title.classList.remove('its-me');
                    }, 200);
                }
            }, 3000); // Проверка каждые 3 секунды
        }

        window.onload = startGlitches;
    </script>
</body>
</html>
