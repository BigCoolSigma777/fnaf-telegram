<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FNaF Anthology Terminal</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --brightness: 0.8; --static-opacity: 0.12; --fnaf-red: #a00; }

        @keyframes signal-jump { 
            0%, 100% { transform: translate(0); } 
            10% { transform: translate(-4px, 2px); filter: brightness(1.4); } 
            20% { transform: translate(4px, -2px); } 
        }

        body { 
            background: #000; color: #eee; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; -webkit-user-select: none;
        }

        /* ЭФФЕКТЫ МОНИТОРА */
        .scanline { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03), transparent); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
        .static-noise { position: fixed; inset: 0; background: url('https://giphy.com'); opacity: var(--static-opacity); pointer-events: none; z-index: 800; }
        .jump-active { animation: signal-jump 0.15s linear !important; }

        /* ГЛАВНОЕ МЕНЮ (ТЕПЕРЬ ВИДИМО СРАЗУ) */
        #main-content { padding: 20px; z-index: 10; width: 100%; box-sizing: border-box; display: block; opacity: 1; }
        
        h1 { font-size: 1.3rem; letter-spacing: 4px; margin: 30px 0; color: #555; text-transform: uppercase; transition: 0.1s; }
        .its-me-style { color: #f00 !important; text-shadow: 0 0 15px red !important; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; filter: brightness(var(--brightness)); }
        
        .game-card { 
            text-decoration: none; background: #080808; border: 1px solid #222; padding: 8px; 
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .game-card:active { border-color: var(--fnaf-red); transform: scale(0.95); filter: brightness(1.5); }
        .game-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; filter: grayscale(0.2); border-bottom: 1px solid #1a1a1a; }
        .game-card span { margin-top: 10px; font-size: 10px; letter-spacing: 1px; color: #666; text-transform: uppercase; }

        .locked { opacity: 0.2; cursor: default; }
        .dev-tag { height: 140px; display: flex; align-items: center; justify-content: center; background: #050505; border: 1px dashed #222; color: #333; font-size: 9px; }

        /* НАСТРОЙКИ */
        .settings-btn { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; background: #222; border-radius: 5px; z-index: 2000; opacity: 0.3; cursor: pointer; }
        #settings-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 3px solid #a00; padding: 20px; z-index: 3000; width: 240px; text-align: left; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="monitor-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>
    <div class="static-noise"></div>
    <div class="scanline"></div>

    <!-- MAIN MENU -->
    <div id="main-content">
        <h1 id="main-title">Terminal Access</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="game-card">
                <img src="assets/fnaf1.jpg"><span>Entry_01: FNaF</span>
            </a>
            <a href="games/fnaf2/index.html" class="game-card">
                <img src="assets/fnaf2.png"><span>Entry_02: FNaF_2</span>
            </a>
            <div class="game-card locked"><div class="dev-tag">DATA CORRUPTED</div><span>Entry_03: ???</span></div>
            <div class="game-card locked"><div class="dev-tag">DATA CORRUPTED</div><span>Entry_04: ???</span></div>
        </div>
    </div>

    <div class="settings-btn" onclick="toggleSettings()"></div>
    <div id="settings-panel">
        <h4 style="color:red; margin:0 0 10px 0; font-size: 12px;">CONFIG_SYS</h4>
        <input type="range" id="bright-ctrl" min="20" max="100" value="80" style="width:100%; accent-color:red;">
        <button onclick="toggleSettings()" style="width:100%; margin-top:15px; background:#a00; color:#fff; border:none; padding:10px; cursor:pointer; font-family: monospace;">CLOSE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const hum = document.getElementById('monitor-hum');
        let audioInited = false;
        
        // Звук включится при первом тапе
        function initAudio() { 
            if(!audioInited && hum) { 
                hum.volume = 0.1; 
                hum.play().catch(()=>{}); 
                audioInited = true; 
            } 
        }

        // ЭФФЕКТЫ МОНИТОРА (ЗАПУСКАЮТСЯ СРАЗУ)
        function triggerGlitch() {
            const title = document.getElementById('main-title');
            if (Math.random() > 0.93) {
                title.innerText = "IT'S ME";
                title.classList.add('its-me-style');
                document.body.classList.add('jump-active');
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                setTimeout(() => {
                    title.innerText = "Terminal Access";
                    title.classList.remove('its-me-style');
                    document.body.classList.remove('jump-active');
                }, 180);
            } else {
                document.body.classList.add('jump-active');
                setTimeout(() => document.body.classList.remove('jump-active'), 100);
            }
            setTimeout(triggerGlitch, 5000 + Math.random() * 5000);
        }
        
        triggerGlitch();

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('bright-ctrl').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--brightness', e.target.value / 100);
        });
    </script>
</body>
</html>
