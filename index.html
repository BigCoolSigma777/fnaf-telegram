<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FNaF Anthology</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --brightness: 0.8; }
        body { background: #000; color: #eee; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Экран предупреждения */
        #warning-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease; text-align: center;
        }

        /* Меню (изначально скрыто) */
        #main-content { display: none; opacity: 0; transition: 1s; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; }
        .game-card { text-decoration: none; background: #080808; border: 1px solid #222; padding: 10px; display: flex; flex-direction: column; color: #fff; }
        .game-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
        h2 { color: #a00; letter-spacing: 5px; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="monitor-hum" loop><source src="https://soundjay.com" type="audio/mpeg"></audio>

    <!-- Экран варнинга -->
    <div id="warning-screen">
        <h2>WARNING</h2>
        <p style="max-width: 250px; color: #555;">This terminal contains disturbing imagery and loud noises.</p>
        <p style="color: #222; font-size: 10px; margin-top: 20px;">LOADING...</p>
    </div>

    <!-- Основное меню -->
    <div id="main-content">
        <h1 style="font-size: 18px; color: #444; letter-spacing: 3px; margin-bottom: 20px;">SELECT NIGHTMARE</h1>
        <div class="grid">
            <a href="games/fnaf1/index.html" class="game-card">
                <img src="assets/fnaf1.jpg"><span>FNaF 1</span>
            </a>
            <a href="games/fnaf2/index.html" class="game-card">
                <img src="assets/fnaf2.png"><span>FNaF 2</span>
            </a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function initAudio() {
            const hum = document.getElementById('monitor-hum');
            if(hum) { hum.volume = 0.1; hum.play().catch(()=>{}); }
        }

        // ЖЕЛЕЗНЫЙ ТАЙМЕР: ЧЕРЕЗ 3 СЕКУНДЫ ВАРНИНГ УХОДИТ
        setTimeout(() => {
            const warning = document.getElementById('warning-screen');
            const menu = document.getElementById('main-content');
            
            if (warning) {
                warning.style.opacity = '0'; // Плавно гасим
                setTimeout(() => {
                    warning.style.display = 'none'; // Полностью удаляем
                    if (menu) {
                        menu.style.display = 'block'; // Показываем меню
                        setTimeout(() => { menu.style.opacity = '1'; }, 50);
                    }
                }, 1000); // 1 сек на анимацию
            }
        }, 3000); // 3 сек висит текст
    </script>
</body>
</html>
